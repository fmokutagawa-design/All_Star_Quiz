<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4択クイズ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background:#111; font-family:'Noto Sans JP',sans-serif; min-height:100vh; overflow:hidden; }

/* 設定画面 */
#setup-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; }
#si { width:100%; max-width:560px; padding:24px 20px; color:#fff; }
#si h1 { font-size:17px; font-weight:bold; margin-bottom:18px; color:#7ecef4; border-bottom:1px solid #333; padding-bottom:10px; }
.fg { margin-bottom:12px; }
.fg label { display:block; font-size:11px; color:#aaa; margin-bottom:4px; }
.fg input,.fg select,.fg textarea { width:100%; background:#222; border:1px solid #444; border-radius:6px; color:#fff; padding:8px 10px; font-size:14px; font-family:inherit; outline:none; }
.fg textarea { resize:none; height:52px; }
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.ci label { font-size:11px; color:#888; margin-bottom:3px; display:block; }
.ci input { width:100%; background:#1a1a1a; border:1px solid #333; border-radius:5px; color:#fff; padding:6px 8px; font-size:13px; font-family:inherit; outline:none; }
/* 画像アップロード */
.ci-img { position:relative; }
.ci-img label { font-size:11px; color:#888; margin-bottom:3px; display:block; }
.ci-img .img-btn { width:100%; background:#1a2a1a; border:1px dashed #555; border-radius:5px; color:#8a8; padding:6px 8px; font-size:12px; font-family:inherit; cursor:pointer; text-align:center; display:block; }
.ci-img input[type=file] { display:none; }
.ci-img .img-preview { width:100%; height:40px; object-fit:cover; border-radius:4px; margin-top:3px; display:none; }
.mode-btn { flex:1; padding:8px; background:#222; border:1px solid #444; border-radius:6px; color:#aaa; font-size:13px; font-family:inherit; cursor:pointer; transition:all .2s; }
.mode-btn.active { background:#1a4a8f; border-color:#7ecef4; color:#fff; font-weight:bold; }
#start-btn { width:100%; padding:12px; background:linear-gradient(135deg,#1a6fc4,#0d4a8f); border:none; border-radius:8px; color:#fff; font-size:15px; font-weight:bold; font-family:inherit; cursor:pointer; letter-spacing:.1em; margin-top:8px; }
.hint { font-size:11px; color:#555; margin-top:8px; text-align:center; }

/* クイズ画面 */
#quiz-screen { display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:#000; overflow:hidden; }
#qc { position:absolute; width:1333px; height:750px; transform-origin:top left; }

/* 座標は全てPPTX実座標(px換算) */
/* 背景 */
#bg { position:absolute; top:0; left:0; width:1333px; height:750px; object-fit:cover; }

/* 上部メインパネル（白い問題画像エリア） */
/* PPTXの白パネルは x=60,y=185,w=1100,h=490 相当（背景画像に含まれる） */
/* 画像を4分割で表示するエリア */
#img-area {
  position:absolute;
  left:70px; top:190px;
  width:1060px; height:380px;
  border-radius:10px;
  overflow:hidden;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:2px;
  background:#ddd;
  z-index:3;
}
.img-cell {
  background:#e8e8e8;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  position:relative;
}
.img-cell img { width:100%; height:100%; object-fit:contain; display:none; }
.img-cell .no-img { color:#bbb; font-size:13px; }

/* 番号丸（白パネル上） */
.top-num { position:absolute; width:49px; height:49px; object-fit:contain; z-index:5; }
#tn1 { left:77px;  top:197px; }
#tn2 { left:607px; top:197px; }
#tn3 { left:77px;  top:382px; }
#tn4 { left:607px; top:382px; }

/* 右側Qパネル（企画名パネル） */
/* x=1155 y=70 w=165 h=530 相当（背景画像の右紫パネル） */
/* 問題文テキスト x=1142 y=232 w=94 h=333 */
#q-text {
  position:absolute;
  left:1142px; top:232px;
  width:94px; height:333px;
  z-index:10;
  writing-mode:vertical-rl;
  text-orientation:mixed;
  color:#0F0E75;
  font-size:18px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  line-height:1.5;
  overflow:hidden;
}

/* カウントダウン動画 x=1116 y=587 w=145 h=130 */
#cd-wrap {
  position:absolute;
  left:1116px; top:587px;
  width:145px; height:130px;
  z-index:20;
}
#cd-video { width:100%; height:100%; object-fit:contain; }

/* 選択肢パネル */
/* ① x=234,y=504 ② x=671,y=504 ③ x=234,y=608 ④ x=671,y=608 全部w=431,h=96 */
.cp { position:absolute; width:431px; height:96px; overflow:hidden; z-index:5; transition:filter .5s; }
#cp1 { left:234px; top:504px; }
#cp2 { left:671px; top:504px; }
#cp3 { left:234px; top:608px; }
#cp4 { left:671px; top:608px; }
.cp-bg,.cp-ba,.cp-bb { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:fill; }
.cp-ba,.cp-bb { opacity:0; }
.cp-num { position:absolute; left:8px; top:50%; transform:translateY(-50%); width:57px; height:57px; object-fit:contain; z-index:6; }
.cp-txt,.cp-txc { position:absolute; left:72px; top:0; width:270px; height:100%; display:flex; align-items:center; font-size:20px; font-weight:bold; line-height:1.2; z-index:6; }
.cp-txt { color:#00005D; }
.cp-txc { color:#fff; opacity:0; z-index:7; }
.cp-mark { position:absolute; right:8px; top:50%; transform:translateY(-50%); width:57px; height:57px; object-fit:contain; z-index:8; opacity:0; transition:opacity .3s; }

#back-btn { position:fixed; bottom:10px; right:10px; background:rgba(0,0,0,.6); border:1px solid #555; color:#aaa; font-size:12px; padding:6px 12px; border-radius:4px; cursor:pointer; z-index:100; font-family:inherit; }
</style>
</head>
<body>

<!-- 設定画面 -->
<div id="setup-screen">
<div id="si">
  <h1>🎯 4択クイズ設定</h1>

  <div class="fg"><label>問題文（右パネルに縦書き表示）</label>
    <textarea id="s-q" placeholder="問題文を入力">日本の首都は？</textarea>
  </div>

  <p style="font-size:11px;color:#888;margin-bottom:6px;">選択肢テキスト</p>
  <div class="g2">
    <div class="ci"><label>①</label><input type="text" id="s-c1" value="東京"></div>
    <div class="ci"><label>②</label><input type="text" id="s-c2" value="大阪"></div>
    <div class="ci"><label>③</label><input type="text" id="s-c3" value="京都"></div>
    <div class="ci"><label>④</label><input type="text" id="s-c4" value="名古屋"></div>
  </div>

  <p style="font-size:11px;color:#888;margin-bottom:6px;">問題画像</p>
  <div style="display:flex;gap:8px;margin-bottom:10px;">
    <button type="button" class="mode-btn active" id="mode-single" onclick="setImgMode('single')">全面1枚</button>
    <button type="button" class="mode-btn" id="mode-quad" onclick="setImgMode('quad')">4分割</button>
  </div>
  <!-- 全面1枚モード -->
  <div id="img-single">
    <div class="ci-img"><label>画像（全面表示）</label>
      <label class="img-btn" for="si0">📷 選択</label>
      <input type="file" id="si0" accept="image/*">
      <img id="sp0" class="img-preview" style="height:60px;">
    </div>
  </div>
  <!-- 4分割モード -->
  <div id="img-quad" style="display:none;">
    <div class="g2">
      <div class="ci-img"><label>① 画像</label>
        <label class="img-btn" for="si1">📷 選択</label>
        <input type="file" id="si1" accept="image/*">
        <img id="sp1" class="img-preview">
      </div>
      <div class="ci-img"><label>② 画像</label>
        <label class="img-btn" for="si2">📷 選択</label>
        <input type="file" id="si2" accept="image/*">
        <img id="sp2" class="img-preview">
      </div>
      <div class="ci-img"><label>③ 画像</label>
        <label class="img-btn" for="si3">📷 選択</label>
        <input type="file" id="si3" accept="image/*">
        <img id="sp3" class="img-preview">
      </div>
      <div class="ci-img"><label>④ 画像</label>
        <label class="img-btn" for="si4">📷 選択</label>
        <input type="file" id="si4" accept="image/*">
        <img id="sp4" class="img-preview">
      </div>
    </div>
  </div>

  <div class="g2">
    <div class="fg" style="margin:0"><label>正解番号</label>
      <select id="s-ans">
        <option value="1">① 番</option>
        <option value="2">② 番</option>
        <option value="3">③ 番</option>
        <option value="4">④ 番</option>
      </select>
    </div>
    <div class="fg" style="margin:0"><label>カウントダウン</label>
      <select id="s-cd">
        <option value="5">5秒</option>
        <option value="10" selected>10秒</option>
        <option value="15">15秒</option>
        <option value="20">20秒</option>
      </select>
    </div>
  </div>

  <button id="start-btn">▶ クイズ開始</button>
  <p class="hint">横向き全画面 + 画面録画 → 動画化</p>
</div>
</div>

<!-- クイズ画面 -->
<div id="quiz-screen">
<div id="qc">
  <img id="bg" src="img5.png">

  <!-- 全面1枚画像 -->
  <img id="img-full" src="" style="position:absolute;left:70px;top:190px;width:1060px;height:380px;object-fit:contain;z-index:3;display:none;background:#eee;border-radius:10px;">

  <!-- 画像4分割エリア -->
  <div id="img-area">
    <div class="img-cell" id="ic1"><span class="no-img">①</span><img id="ii1"></div>
    <div class="img-cell" id="ic2"><span class="no-img">②</span><img id="ii2"></div>
    <div class="img-cell" id="ic3"><span class="no-img">③</span><img id="ii3"></div>
    <div class="img-cell" id="ic4"><span class="no-img">④</span><img id="ii4"></div>
  </div>

  <!-- 番号丸 -->
  <img class="top-num" id="tn1" src="img4.png">
  <img class="top-num" id="tn2" src="img3.png">
  <img class="top-num" id="tn3" src="img2.png">
  <img class="top-num" id="tn4" src="img1.png">

  <!-- 問題文（右パネル縦書き） -->
  <div id="q-text"></div>

  <!-- カウントダウン動画 -->
  <div id="cd-wrap"><video id="cd-video" playsinline muted></video></div>

  <!-- 選択肢① -->
  <div class="cp" id="cp1">
    <img class="cp-bg" src="img6.png">
    <img class="cp-ba" id="ca1" src="img7.png">
    <img class="cp-bb" id="cb1" src="img6.png">
    <img class="cp-num" src="img4.png">
    <div class="cp-txt" id="ct1"></div>
    <div class="cp-txc" id="cc1"></div>
    <img class="cp-mark" id="cm1" src="img11.png">
  </div>
  <!-- 選択肢② -->
  <div class="cp" id="cp2">
    <img class="cp-bg" src="img6.png">
    <img class="cp-ba" id="ca2" src="img7.png">
    <img class="cp-bb" id="cb2" src="img6.png">
    <img class="cp-num" src="img3.png">
    <div class="cp-txt" id="ct2"></div>
    <div class="cp-txc" id="cc2"></div>
    <img class="cp-mark" id="cm2" src="img10.png">
  </div>
  <!-- 選択肢③ -->
  <div class="cp" id="cp3">
    <img class="cp-bg" src="img6.png">
    <img class="cp-ba" id="ca3" src="img7.png">
    <img class="cp-bb" id="cb3" src="img6.png">
    <img class="cp-num" src="img2.png">
    <div class="cp-txt" id="ct3"></div>
    <div class="cp-txc" id="cc3"></div>
    <img class="cp-mark" id="cm3" src="img9.png">
  </div>
  <!-- 選択肢④ -->
  <div class="cp" id="cp4">
    <img class="cp-bg" src="img6.png">
    <img class="cp-ba" id="ca4" src="img7.png">
    <img class="cp-bb" id="cb4" src="img6.png">
    <img class="cp-num" src="img1.png">
    <div class="cp-txt" id="ct4"></div>
    <div class="cp-txc" id="cc4"></div>
    <img class="cp-mark" id="cm4" src="img8.png">
  </div>

</div>
<button id="back-btn">← 設定に戻る</button>
</div>

<script>
const CD = {
  5:  {file:'cd8.mp4', ms:9032},
  10: {file:'cd7.mp4', ms:14047},
  15: {file:'cd6.mp4', ms:19063},
  20: {file:'cd5.mp4', ms:24055},
};

let timers=[], blinkTid=null;
const sched=(ms,fn)=>timers.push(setTimeout(fn,ms));
function clearAll(){timers.forEach(clearTimeout);timers=[];if(blinkTid){clearInterval(blinkTid);blinkTid=null;}}

function resize(){
  const qc=document.getElementById('qc');
  const s=Math.min(window.innerWidth/1333, window.innerHeight/750);
  const ox=(window.innerWidth-1333*s)/2;
  const oy=(window.innerHeight-750*s)/2;
  qc.style.transform=`translate(${ox}px,${oy}px) scale(${s})`;
}
window.addEventListener('resize',resize);

function blink(n){
  const a=document.getElementById('ca'+n), b=document.getElementById('cb'+n);
  let ph=0;
  const tick=()=>{
    if(ph%2===0){a.style.opacity='1';b.style.opacity='0';}
    else{a.style.opacity='0';b.style.opacity='1';}
    ph++;
  };
  tick();
  blinkTid=setInterval(tick,300);
  setTimeout(()=>{clearInterval(blinkTid);blinkTid=null;a.style.opacity='1';b.style.opacity='0';},300*6+150);
}

function resetUI(){
  for(let i=1;i<=4;i++){
    document.getElementById('cp'+i).style.filter='';
    ['ca','cb','cm'].forEach(p=>document.getElementById(p+i).style.opacity='0');
    document.getElementById('cc'+i).style.opacity='0';
    document.getElementById('ct'+i).style.opacity='1';
  }
}

let imgMode = 'single';
function setImgMode(mode) {
  imgMode = mode;
  document.getElementById('img-single').style.display = mode==='single' ? 'block' : 'none';
  document.getElementById('img-quad').style.display   = mode==='quad'   ? 'block' : 'none';
  document.getElementById('mode-single').classList.toggle('active', mode==='single');
  document.getElementById('mode-quad').classList.toggle('active', mode==='quad');
}

// si0（全面画像）プレビュー
document.getElementById('si0').addEventListener('change', function(){
  if(!this.files[0]) return;
  const url = URL.createObjectURL(this.files[0]);
  const sp = document.getElementById('sp0');
  sp.src = url; sp.style.display = 'block';
  document.querySelector('label[for="si0"]').textContent = '✓ 選択済';
});

// 画像プレビュー設定
[1,2,3,4].forEach(i=>{
  document.getElementById('si'+i).addEventListener('change',function(){
    if(!this.files[0]) return;
    const url=URL.createObjectURL(this.files[0]);
    const sp=document.getElementById('sp'+i);
    sp.src=url; sp.style.display='block';
    document.querySelector('#si'+i).closest('.ci-img').querySelector('.img-btn').textContent='✓ 選択済';
  });
});

function runQuiz(cfg){
  clearAll(); resetUI();
  const correct=parseInt(cfg.ans), cdSec=parseInt(cfg.cd), cdMs=CD[cdSec].ms;

  document.getElementById('q-text').textContent=cfg.q;
  for(let i=1;i<=4;i++){
    document.getElementById('ct'+i).textContent=cfg['c'+i];
    document.getElementById('cc'+i).textContent=cfg['c'+i];
  }

  // 画像モード切り替え
  const fullImg = document.getElementById('img-full');
  const imgArea = document.getElementById('img-area');
  if(cfg.imgMode === 'single' && cfg.img0) {
    fullImg.src = cfg.img0; fullImg.style.display = 'block';
    imgArea.style.display = 'none';
  } else if(cfg.imgMode === 'quad') {
    fullImg.style.display = 'none';
    imgArea.style.display = 'grid';
    for(let i=1;i<=4;i++){
      const src=cfg['img'+i];
      const img=document.getElementById('ii'+i);
      const noimg=document.querySelector('#ic'+i+' .no-img');
      if(src){ img.src=src; img.style.display='block'; if(noimg) noimg.style.display='none'; }
      else   { img.style.display='none'; if(noimg) noimg.style.display='block'; }
    }
  } else {
    fullImg.style.display = 'none';
    imgArea.style.display = 'grid';
  }

  // 動画
  const vid=document.getElementById('cd-video');
  vid.src=CD[cdSec].file; vid.load(); vid.play().catch(()=>{});

  // カウントダウン後
  sched(cdMs,()=>{
    for(let i=1;i<=4;i++){
      if(i!==correct) document.getElementById('cp'+i).style.filter='brightness(0.3) saturate(0.2)';
    }
    blink(correct);
    document.getElementById('ct'+correct).style.opacity='0';
    document.getElementById('cc'+correct).style.opacity='1';
    sched(300,()=>document.getElementById('cm'+correct).style.opacity='1');
  });
}

document.getElementById('start-btn').addEventListener('click',()=>{
  const f0 = document.getElementById('si0').files[0];
  const imgs = { imgMode, img0: f0 ? URL.createObjectURL(f0) : null };
  [1,2,3,4].forEach(i=>{
    const f=document.getElementById('si'+i).files[0];
    imgs['img'+i]=f?URL.createObjectURL(f):null;
  });
  const cfg={
    q: document.getElementById('s-q').value,
    c1:document.getElementById('s-c1').value,
    c2:document.getElementById('s-c2').value,
    c3:document.getElementById('s-c3').value,
    c4:document.getElementById('s-c4').value,
    ans:document.getElementById('s-ans').value,
    cd: document.getElementById('s-cd').value,
    ...imgs
  };
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  resize();
  runQuiz(cfg);
});

document.getElementById('back-btn').addEventListener('click',()=>{
  clearAll();
  document.getElementById('cd-video').pause();
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('setup-screen').style.display='flex';
});
</script>
</body>
</html>
